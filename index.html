<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Astro Dungeons</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a1a; }
    canvas { display: block; }

    #hud {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 16px;
      align-items: center;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      font-size: 13px;
      background: rgba(0,0,0,0.55);
      padding: 10px 20px;
      border-radius: 12px;
      pointer-events: none;
      user-select: none;
    }
    .hud-btn {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .btn {
      width: 22px; height: 22px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: bold;
      color: #000;
    }
    .btn-a { background: #3ddc84; }
    .btn-b { background: #f04040; }
    .btn-x { background: #4090f0; }
    .btn-y { background: #f0c020; }
    .btn-rt { background: #ccc; font-size: 9px; border-radius: 6px; width: 28px; padding: 0 2px; }
    .btn-lt { background: #ccc; font-size: 9px; border-radius: 6px; width: 28px; padding: 0 2px; }
    .btn-lb { background: #ccc; font-size: 9px; border-radius: 6px; width: 28px; padding: 0 2px; }
    .stick { background: #888; border-radius: 50%; width: 22px; height: 22px; font-size: 9px; display: inline-flex; align-items: center; justify-content: center; color: #fff; }
    #controller-status {
      position: fixed;
      top: 16px;
      right: 16px;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      font-size: 12px;
      background: rgba(0,0,0,0.5);
      padding: 6px 14px;
      border-radius: 8px;
      pointer-events: none;
    }
    #controller-status.connected { color: #3ddc84; }
    #controller-status.disconnected { color: #f04040; }
  </style>
</head>
<body>
  <div id="controller-status" class="disconnected">⬛ Gamepad: desconectado</div>
  <div id="hud">
    <div class="hud-btn"><span class="stick">L</span> Mover</div>
    <div class="hud-btn"><span class="btn btn-a">A</span> Cuerpo a cuerpo</div>
    <div class="hud-btn"><span class="btn btn-rt">RT</span> Ataque distancia</div>
    <div class="hud-btn"><span class="stick">R3</span> Roll</div>
    <div class="hud-btn"><span class="btn btn-lb">LB</span> Curar</div>
    <div class="hud-btn"><span class="btn btn-x">X</span> Objeto 1</div>
    <div class="hud-btn"><span class="btn btn-y">Y</span> Objeto 2</div>
    <div class="hud-btn"><span class="btn btn-b">B</span> Objeto 3</div>
    <div class="hud-btn"><span class="stick">▼</span> Mapa</div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
